<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Water drop/conduit icon -->
  <g transform="translate(20, 20)">
    <!-- Main conduit pipe -->
    <rect x="0" y="30" width="60" height="40" rx="4" fill="#313244" stroke="#94e2d5" stroke-width="2"/>
    <rect x="4" y="34" width="52" height="32" rx="2" fill="#1e1e2e"/>

    <!-- Water flow indicators -->
    <circle cx="15" cy="50" r="3" fill="#89b4fa" opacity="0.8">
      <animate attributeName="cx" from="10" to="50" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.8" to="0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="50" r="3" fill="#74c7ec" opacity="0.6">
      <animate attributeName="cx" from="10" to="50" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.6" to="0" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="50" r="3" fill="#94e2d5" opacity="0.4">
      <animate attributeName="cx" from="10" to="50" dur="2s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.4" to="0" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Input/Output connectors -->
    <circle cx="0" cy="50" r="4" fill="#45475a" stroke="#94e2d5" stroke-width="1.5"/>
    <circle cx="60" cy="50" r="4" fill="#45475a" stroke="#94e2d5" stroke-width="1.5"/>
  </g>

  <!-- CONDUIT text -->
  <text x="100" y="75" font-family="JetBrains Mono, monospace" font-size="48" font-weight="700" fill="url(#gradient)">CONDUIT</text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
