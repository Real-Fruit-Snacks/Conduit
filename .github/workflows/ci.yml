name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            install_deps: sudo apt-get update && sudo apt-get install -y libssl-dev libreadline-dev
          - os: macos-latest
            install_deps: brew install openssl readline

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: ${{ matrix.install_deps }}

    - name: Build Conduit
      run: |
        cd socat-repo
        ./configure
        touch doc/socat.1
        make conduit

    - name: Run tests
      run: make test

    - name: Check binary size
      run: ls -lh socat-repo/conduit

    - name: Upload Conduit binary
      uses: actions/upload-artifact@v4
      with:
        name: conduit-${{ matrix.os }}
        path: socat-repo/conduit

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './docs'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run security checks
      run: |
        # Check for common security issues in C code
        if command -v cppcheck &> /dev/null; then
          echo "Running cppcheck..."
          cppcheck --enable=warning,style --error-exitcode=0 socat-repo/socat.c socat-repo/stealth.c
        fi

        # Check for hardcoded secrets
        echo "Checking for hardcoded secrets..."
        ! grep -rE '(password|secret|api_key|token)\s*=\s*["\047][^"\047]+["\047]' --include='*.c' --include='*.h' socat-repo/ || echo "⚠️ Potential hardcoded secrets found"

    - name: Legal compliance check
      run: |
        echo "Verifying license headers..."
        if ! grep -q "GNU General Public License" LICENSE; then
          echo "❌ LICENSE file missing or invalid"
          exit 1
        fi
        if ! grep -q "OpenSSL" LICENSE; then
          echo "❌ OpenSSL exception missing from LICENSE"
          exit 1
        fi
        echo "✅ License compliance verified"
